          rm -rf package-nomodels
          cp -R package package-nomodels
          find package-nomodels -type d -name models -exec sh -c 'rm -rf "$1"/*' _ {} \;
          mkdir -p package-nomodels/SVCFusionStudio/models

          # Create tarball
          cd package
          tar -czvf ../SVCFusionStudio-Linux-GPU.tar.gz SVCFusionStudio

          cd ../package-nomodels
          tar -czvf ../SVCFusionStudio-Linux-GPU-NoModels.tar.gz SVCFusionStudio

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Linux-GPU
          path: SVCFusionStudio-Linux-GPU.tar.gz
          retention-days: 30

      - name: Upload Artifact (No Models)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Linux-GPU-NoModels
          path: SVCFusionStudio-Linux-GPU-NoModels.tar.gz
          retention-days: 30

  # ===========================================
  # Create Release
  # ===========================================
  release:
    name: Create Release
    needs:
      - build-windows-cpu
      - build-windows-directml
      - build-windows-cuda
      - build-macos
      - build-linux
      - build-linux-gpu
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          cd artifacts

          # Windows packages
          if [ -d "SVCFusionStudio-Windows-CPU" ]; then
            cd SVCFusionStudio-Windows-CPU && zip -r ../SVCFusionStudio-Windows-CPU.zip . && cd ..
          fi

          if [ -d "SVCFusionStudio-Windows-CPU-NoModels" ]; then
            cd SVCFusionStudio-Windows-CPU-NoModels && zip -r ../SVCFusionStudio-Windows-CPU-NoModels.zip . && cd ..
          fi

          if [ -d "SVCFusionStudio-Windows-DirectML" ]; then
            cd SVCFusionStudio-Windows-DirectML && zip -r ../SVCFusionStudio-Windows-DirectML.zip . && cd ..
          fi

          if [ -d "SVCFusionStudio-Windows-DirectML-NoModels" ]; then
            cd SVCFusionStudio-Windows-DirectML-NoModels && zip -r ../SVCFusionStudio-Windows-DirectML-NoModels.zip . && cd ..
          fi

          if [ -d "SVCFusionStudio-Windows-CUDA" ]; then
            cd SVCFusionStudio-Windows-CUDA && zip -r ../SVCFusionStudio-Windows-CUDA.zip . && cd ..
          fi

          if [ -d "SVCFusionStudio-Windows-CUDA-NoModels" ]; then
            cd SVCFusionStudio-Windows-CUDA-NoModels && zip -r ../SVCFusionStudio-Windows-CUDA-NoModels.zip . && cd ..
          fi

          # macOS DMG is already ready
          if [ -d "SVCFusionStudio-macOS" ]; then
            mv SVCFusionStudio-macOS/*.dmg ./SVCFusionStudio-macOS.dmg || true
          fi

          if [ -d "SVCFusionStudio-macOS-NoModels" ]; then
            mv SVCFusionStudio-macOS-NoModels/*.dmg ./SVCFusionStudio-macOS-NoModels.dmg || true
          fi

          # macOS App ZIP is already ready
          if [ -d "SVCFusionStudio-macOS-App" ]; then
            mv SVCFusionStudio-macOS-App/*.zip ./SVCFusionStudio-macOS-App.zip || true
          fi

          if [ -d "SVCFusionStudio-macOS-App-NoModels" ]; then
            mv SVCFusionStudio-macOS-App-NoModels/*.zip ./SVCFusionStudio-macOS-App-NoModels.zip || true
          fi

          # Linux tarballs are already ready
          if [ -d "SVCFusionStudio-Linux" ]; then
            mv SVCFusionStudio-Linux/*.tar.gz ./SVCFusionStudio-Linux.tar.gz || true
          fi

          if [ -d "SVCFusionStudio-Linux-NoModels" ]; then
            mv SVCFusionStudio-Linux-NoModels/*.tar.gz ./SVCFusionStudio-Linux-NoModels.tar.gz || true
          fi

          if [ -d "SVCFusionStudio-Linux-GPU" ]; then
            mv SVCFusionStudio-Linux-GPU/*.tar.gz ./SVCFusionStudio-Linux-GPU.tar.gz || true
          fi

          if [ -d "SVCFusionStudio-Linux-GPU-NoModels" ]; then
            mv SVCFusionStudio-Linux-GPU-NoModels/*.tar.gz ./SVCFusionStudio-Linux-GPU-NoModels.tar.gz || true
          fi

          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SVCFusionStudio-Windows-CPU.zip
            artifacts/SVCFusionStudio-Windows-CPU-NoModels.zip
            artifacts/SVCFusionStudio-Windows-DirectML.zip
            artifacts/SVCFusionStudio-Windows-DirectML-NoModels.zip
            artifacts/SVCFusionStudio-Windows-CUDA.zip
            artifacts/SVCFusionStudio-Windows-CUDA-NoModels.zip
            artifacts/SVCFusionStudio-macOS.dmg
            artifacts/SVCFusionStudio-macOS-NoModels.dmg
            artifacts/SVCFusionStudio-macOS-App.zip
            artifacts/SVCFusionStudio-macOS-App-NoModels.zip
            artifacts/SVCFusionStudio-Linux.tar.gz
            artifacts/SVCFusionStudio-Linux-NoModels.tar.gz
            artifacts/SVCFusionStudio-Linux-GPU.tar.gz
            artifacts/SVCFusionStudio-Linux-GPU-NoModels.tar.gz
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
