            Write-Host "Selected $baseFile <= $(Split-Path $sourcePath -Leaf)"
          }

          foreach ($binName in @("cent_table.bin", "mel_filterbank.bin")) {
            $binFile = Get-ChildItem -Path $extractDir -Recurse -File -Filter $binName | Select-Object -First 1
