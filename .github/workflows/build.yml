          $hnsepDest = Join-Path $dstModels "hnsep"
          if (-not (Test-Path $hnsepSource)) {
            throw "hnsep model directory not found in model cache: $hnsepSource"
          }
          if (Test-Path $hnsepDest) {
            Remove-Item -Recurse -Force $hnsepDest
          }
          Copy-Item -Path $hnsepSource -Destination $hnsepDest -Recurse -Force
          foreach ($requiredHNSep in @("hnsep_VR.onnx", "hnsep_VR_convstft.onnx", "split/hnsep_pre.onnx", "split/hnsep_core.onnx", "split/hnsep_post.onnx")) {
            $requiredPath = Join-Path $hnsepDest $requiredHNSep
            if (-not (Test-Path $requiredPath)) {
              throw "Required HNSep model missing after copy: $requiredPath"
            }
          }
          Write-Host "Prepared HNSep model directory <= $hnsepSource"

          Write-Host "Prepared build models in $dstModels"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DUSE_CUDA=ON -DUSE_ASIO=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel -- /p:WholeProgramOptimization=false

      - name: Prepare Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package

          # Copy standalone app
          Copy-Item -Path "build/SVCFusionStudio_artefacts/${{ env.BUILD_TYPE }}/*" -Destination "package/" -Recurse -Force

          # Move VST3 binary next to the exe (avoid the VST3 folder packaging)
          $vst3Binary = "build/SVCFusionStudioPlugin_artefacts/${{ env.BUILD_TYPE }}/VST3/SVCFusionStudio.vst3/Contents/x86_64-win/SVCFusionStudio.vst3"
          if (Test-Path $vst3Binary) {
            Copy-Item -Path $vst3Binary -Destination "package/SVCFusionStudio.vst3" -Force
          } else {
            Write-Warning "VST3 binary not found at $vst3Binary"
          }

          if (Test-Path "package/VST3") {
            Remove-Item -Recurse -Force "package/VST3"
          }

          # Create no-models package (keep models dirs, remove files)
          New-Item -ItemType Directory -Force -Path package-nomodels
          Copy-Item -Path "package/*" -Destination "package-nomodels" -Recurse -Force
          Get-ChildItem -Path "package-nomodels" -Recurse -Directory -Filter models | ForEach-Object {
            Get-ChildItem -Path $_.FullName -Force | Remove-Item -Recurse -Force
            New-Item -ItemType Directory -Force -Path $_.FullName | Out-Null
          }
          if (-not (Test-Path "package-nomodels/models")) {
            New-Item -ItemType Directory -Force -Path "package-nomodels/models" | Out-Null
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Windows-CUDA
          path: package/
          retention-days: 30

      - name: Upload Artifact (No Models)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Windows-CUDA-NoModels
          path: package-nomodels/
          retention-days: 30

  # ===========================================
  # macOS Build (Apple Silicon)
  # ===========================================
  build-macos:
    needs: prepare-model-cache
    runs-on: macos-14
    name: macOS (ARM64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Ensure JUCE Build Helpers
        shell: bash
        run: |
          set -euo pipefail

          required="third_party/JUCE/extras/Build/CMake/JUCEModuleSupport.cmake"
          if [ -f "$required" ]; then
            echo "JUCE build helpers already present"
            exit 0
          fi

          juce_cmake="third_party/JUCE/CMakeLists.txt"
          [ -f "$juce_cmake" ]

          juce_version=$(grep -Eo 'project\(JUCE VERSION [0-9.]+' "$juce_cmake" | awk '{print $3}' | head -n1)
          if [ -z "$juce_version" ]; then
            echo "Unable to parse JUCE version from $juce_cmake" >&2
            exit 1
          fi

          tmp_dir=".ci-juce"
          archive_path="$tmp_dir/JUCE.tar.gz"
          download_url="https://github.com/juce-framework/JUCE/archive/refs/tags/${juce_version}.tar.gz"

          rm -rf "$tmp_dir"
          mkdir -p "$tmp_dir"

          curl -L --retry 3 --fail -o "$archive_path" "$download_url"
          tar -xzf "$archive_path" -C "$tmp_dir"

          src_build_dir=$(find "$tmp_dir" -type d -path '*/extras/Build' -print -quit)
          if [ -z "$src_build_dir" ]; then
            echo "Downloaded JUCE archive does not contain extras/Build" >&2
            exit 1
          fi

          mkdir -p third_party/JUCE/extras
          cp -R "$src_build_dir" third_party/JUCE/extras/

          test -f "$required"

      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: build/_deps/onnxruntime-src
          key: macos-onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-arm64

      - name: Restore Model Cache
        uses: actions/download-artifact@v4
        with:
          name: ci-model-cache
          path: .ci-model-cache/extracted

      - name: Prepare Runtime Models (CPU fp32 slim)
        shell: bash
        run: |
          set -euo pipefail

          extract_dir=".ci-model-cache/extracted"
          if [ ! -d "${extract_dir}" ]; then
            echo "Model cache directory not found: ${extract_dir}" >&2
            exit 1
          fi

          dst_models="Resources/models"
          mkdir -p "${dst_models}"

          onnx_count=$(find "${extract_dir}" -type f -name "*.onnx" | wc -l | tr -d ' ')
          if [ "${onnx_count}" -eq 0 ]; then
            echo "No ONNX files found in model cache" >&2
            exit 1
          fi

          find_model() {
            local name="$1"
            find "${extract_dir}" -type f -name "${name}" -print -quit
          }

          resolve_model() {
            local base="$1"
            shift
            local candidate
            local found

            for candidate in "$@"; do
              found=$(find_model "${candidate}")
              if [ -n "${found}" ]; then
                cp -f "${found}" "${dst_models}/${base}"
                echo "Selected ${base} <= $(basename "${found}")"
                return 0
              fi
            done

            echo "Unable to resolve required ONNX model '${base}'. Tried: $*" >&2
            exit 1
          }

          targets=(contentvec768l12 pc_nsf_hifigan fcpe rmvpe some)
          for stem in "${targets[@]}"; do
            resolve_model "${stem}.onnx" "${stem}_fp32_slim.onnx" "${stem}_fp32.onnx" "${stem}.onnx"
          done

          for bin_name in cent_table.bin mel_filterbank.bin; do
            bin_path=$(find_model "${bin_name}")
            if [ -z "${bin_path}" ]; then
              echo "Required model not found in cache: ${bin_name}" >&2
              exit 1
            fi

            cp -f "${bin_path}" "${dst_models}/${bin_name}"
            echo "Selected ${bin_name} <= $(basename "${bin_path}")"
          done

      - name: Install ccache
        run: brew install ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-arm64-${{ github.sha }}
          restore-keys: ccache-macos-arm64-

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Prepare Package
        run: |
          mkdir -p package

          # Copy standalone app (PRODUCT_NAME has a space)
          cp -R "build/SVCFusionStudio_artefacts/${{ env.BUILD_TYPE }}/SVCFusion Studio.app" package/

          # Copy VST3 plugin
          if [ -d "build/SVCFusionStudioPlugin_artefacts/${{ env.BUILD_TYPE }}/VST3" ]; then
            cp -R "build/SVCFusionStudioPlugin_artefacts/${{ env.BUILD_TYPE }}/VST3/SVCFusion Studio.vst3" package/
          fi

          # Copy AU plugin
          if [ -d "build/SVCFusionStudioPlugin_artefacts/${{ env.BUILD_TYPE }}/AU" ]; then
            cp -R "build/SVCFusionStudioPlugin_artefacts/${{ env.BUILD_TYPE }}/AU/SVCFusion Studio.component" package/
          fi

          # Create no-models package (keep models dirs, remove files)
          rm -rf package-nomodels
          cp -R package package-nomodels
          find package-nomodels -type d -name models -exec sh -c 'rm -rf "$1"/*' _ {} \;
          mkdir -p "package-nomodels/SVCFusion Studio.app/Contents/Resources/models"
          if [ -d "package-nomodels/SVCFusion Studio.vst3" ]; then
            mkdir -p "package-nomodels/SVCFusion Studio.vst3/Contents/Resources/models"
          fi
          if [ -d "package-nomodels/SVCFusion Studio.component" ]; then
            mkdir -p "package-nomodels/SVCFusion Studio.component/Contents/Resources/models"
          fi

      - name: Ad-hoc Code Sign
        run: |
          codesign --force --deep -s - "package/SVCFusion Studio.app" || true
          codesign --force --deep -s - "package/SVCFusion Studio.vst3" || true
          codesign --force --deep -s - "package/SVCFusion Studio.component" || true
          codesign --force --deep -s - "package-nomodels/SVCFusion Studio.app" || true
          codesign --force --deep -s - "package-nomodels/SVCFusion Studio.vst3" || true
          codesign --force --deep -s - "package-nomodels/SVCFusion Studio.component" || true

      - name: Create DMG
        run: |
          for volume in "SVCFusionStudio" "SVCFusionStudio-NoModels"; do
            if [ -d "/Volumes/$volume" ]; then
              hdiutil detach "/Volumes/$volume" || hdiutil detach -force "/Volumes/$volume"
            fi
          done

          rm -f SVCFusionStudio-macOS.dmg SVCFusionStudio-macOS-NoModels.dmg

          hdiutil create -volname "SVCFusionStudio" \
            -srcfolder package \
            -ov -format UDZO \
            SVCFusionStudio-macOS.dmg
          hdiutil create -volname "SVCFusionStudio-NoModels" \
            -srcfolder package-nomodels \
            -ov -format UDZO \
            SVCFusionStudio-macOS-NoModels.dmg

      - name: Create App ZIP
        run: |
          cd package
          zip -r ../SVCFusionStudio-macOS-App.zip "SVCFusion Studio.app"
          cd ../package-nomodels
          zip -r ../SVCFusionStudio-macOS-App-NoModels.zip "SVCFusion Studio.app"

      - name: Upload Artifact (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-macOS
          path: SVCFusionStudio-macOS.dmg
          retention-days: 30

      - name: Upload Artifact (DMG, No Models)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-macOS-NoModels
          path: SVCFusionStudio-macOS-NoModels.dmg
          retention-days: 30

      - name: Upload Artifact (App ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-macOS-App
          path: SVCFusionStudio-macOS-App.zip
          retention-days: 30

      - name: Upload Artifact (App ZIP, No Models)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-macOS-App-NoModels
          path: SVCFusionStudio-macOS-App-NoModels.zip
          retention-days: 30

      - name: Upload Artifact (Unpacked)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-macOS-Unpacked
          path: package/
          retention-days: 30

      - name: Upload Artifact (Unpacked, No Models)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-macOS-Unpacked-NoModels
          path: package-nomodels/
          retention-days: 30

