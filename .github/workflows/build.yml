name: Build SVCFusion Studio

on:
  push:
    branches: [main, master, refactor]
  pull_request:
    branches: [main, master, refactor]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  ONNXRUNTIME_VERSION: "1.17.3"
  DIRECTML_VERSION: "1.15.4"
  MODEL_BASE_URL: "https://huggingface.co/SVCFusion/things/resolve/main"
  MODEL_CACHE_KEY: "svcfusion-models-v4"

jobs:
  # ===========================================
  # Prepare Shared Model Cache
  # ===========================================
  prepare-model-cache:
    runs-on: ubuntu-22.04
    name: Prepare Model Cache

    steps:
      - name: Restore/Save Model Cache
        id: models-cache
        uses: actions/cache@v4
        with:
          path: .ci-model-cache/extracted
          key: ${{ env.MODEL_CACHE_KEY }}
          enableCrossOsArchive: true

      - name: Download Models
        if: steps.models-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          rm -rf .ci-model-cache/extracted
          mkdir -p .ci-model-cache/extracted

          while IFS= read -r rel_path; do
            [ -n "${rel_path}" ] || continue
            mkdir -p ".ci-model-cache/extracted/$(dirname "${rel_path}")"
            curl -L --retry 3 --fail \
              -o ".ci-model-cache/extracted/${rel_path}" \
              "${{ env.MODEL_BASE_URL }}/${rel_path}?download=true"
          done <<'EOF'
          cent_table.bin
          contentvec768l12.onnx
          fcpe.onnx
          mel_filterbank.bin
          pc_nsf_hifigan.onnx
          rmvpe.onnx
          some.onnx
          GAME/bd2dur.onnx
          GAME/config.json
          GAME/dur2bd.onnx
          GAME/encoder.onnx
          GAME/estimator.onnx
          GAME/segmenter.onnx
          hnsep/config.json
          hnsep/hnsep_VR.onnx
          hnsep/hnsep_VR_convstft.onnx
          hnsep/split/hnsep_pre.onnx
          hnsep/split/hnsep_core.onnx
          hnsep/split/hnsep_post.onnx
          EOF

          test -f .ci-model-cache/extracted/pc_nsf_hifigan.onnx
          test -f .ci-model-cache/extracted/cent_table.bin
          test -f .ci-model-cache/extracted/hnsep/hnsep_VR.onnx
          test -f .ci-model-cache/extracted/hnsep/hnsep_VR_convstft.onnx
          test -f .ci-model-cache/extracted/hnsep/split/hnsep_core.onnx

      - name: Upload Model Cache Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-model-cache
          path: .ci-model-cache/extracted/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  # ===========================================
  # Windows CPU Build
  # ===========================================
  build-windows-cpu:
    needs: prepare-model-cache
    runs-on: windows-latest
    name: Windows (CPU)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Ensure JUCE Build Helpers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $required = "third_party/JUCE/extras/Build/CMake/JUCEModuleSupport.cmake"
          if (Test-Path $required) {
            Write-Host "JUCE build helpers already present"
            exit 0
          }

          $juceCmake = "third_party/JUCE/CMakeLists.txt"
          if (-not (Test-Path $juceCmake)) {
            throw "Missing $juceCmake"
          }

          $match = Select-String -Path $juceCmake -Pattern 'project\(JUCE VERSION ([0-9\.]+)' | Select-Object -First 1
          if (-not $match) {
            throw "Unable to parse JUCE version from $juceCmake"
          }

          $juceVersion = $match.Matches[0].Groups[1].Value
          $tmpDir = Join-Path $PWD ".ci-juce"
          $archivePath = Join-Path $tmpDir "JUCE.tar.gz"
          $downloadUrl = "https://github.com/juce-framework/JUCE/archive/refs/tags/$juceVersion.tar.gz"

          if (Test-Path $tmpDir) {
            Remove-Item -Recurse -Force $tmpDir
          }
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          tar -xzf $archivePath -C $tmpDir

          $extractRoot = Get-ChildItem -Path $tmpDir -Directory | Where-Object { $_.Name -like "JUCE-*" } | Select-Object -First 1
          if (-not $extractRoot) {
            throw "Failed to extract JUCE archive"
          }

          $srcBuildDir = Join-Path $extractRoot.FullName "extras/Build"
          if (-not (Test-Path $srcBuildDir)) {
            throw "Downloaded JUCE archive does not contain extras/Build"
          }

          New-Item -ItemType Directory -Force -Path "third_party/JUCE/extras" | Out-Null
          Copy-Item -Path $srcBuildDir -Destination "third_party/JUCE/extras/" -Recurse -Force

          if (-not (Test-Path $required)) {
            throw "Failed to restore $required"
          }

      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: build/_deps/onnxruntime-src
          key: windows-onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-cpu

      - name: Restore Model Cache
        uses: actions/download-artifact@v4
        with:
          name: ci-model-cache
          path: .ci-model-cache/extracted

      - name: Prepare Build Models (CPU fp32 slim)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $extractDir = ".ci-model-cache/extracted"
          if (-not (Test-Path $extractDir)) {
            throw "Model cache directory not found: $extractDir"
          }

          $dstModels = "Resources/models"
          New-Item -ItemType Directory -Force -Path $dstModels | Out-Null

          $onnxFiles = Get-ChildItem -Path $extractDir -Recurse -File -Filter *.onnx
          if (-not $onnxFiles) {
            throw "No ONNX files found in model cache"
          }

          $onnxMap = @{}
          foreach ($file in $onnxFiles) {
            $onnxMap[$file.Name.ToLowerInvariant()] = $file.FullName
          }

          function Resolve-OnnxCandidate {
            param(
              [string] $BaseFile,
              [string[]] $Candidates
            )

            foreach ($candidate in $Candidates) {
              $key = $candidate.ToLowerInvariant()
              if ($onnxMap.ContainsKey($key)) {
                return $onnxMap[$key]
              }
            }

            throw "Unable to resolve required ONNX model '$BaseFile'. Tried: $($Candidates -join ', ')"
          }

          $targetOnnx = @(
            "contentvec768l12.onnx",
            "pc_nsf_hifigan.onnx",
            "fcpe.onnx",
            "rmvpe.onnx",
            "some.onnx"
          )

          foreach ($baseFile in $targetOnnx) {
            $stem = [System.IO.Path]::GetFileNameWithoutExtension($baseFile)
            $sourcePath = Resolve-OnnxCandidate -BaseFile $baseFile -Candidates @(
              "${stem}_fp32_slim.onnx",
              "${stem}_fp32.onnx",
              $baseFile
            )

            Copy-Item -Path $sourcePath -Destination (Join-Path $dstModels $baseFile) -Force
            Write-Host "Selected $baseFile <= $(Split-Path $sourcePath -Leaf)"
          }

          foreach ($binName in @("cent_table.bin", "mel_filterbank.bin")) {
            $binFile = Get-ChildItem -Path $extractDir -Recurse -File -Filter $binName | Select-Object -First 1
            if ($binFile) {
              Copy-Item -Path $binFile.FullName -Destination (Join-Path $dstModels $binName) -Force
              Write-Host "Prepared $binName <= $(Split-Path $binFile.FullName -Leaf)"
            } else {
              throw "$binName not found in model cache"
            }
          }

          $hnsepSource = Join-Path $extractDir "hnsep"
          $hnsepDest = Join-Path $dstModels "hnsep"
          if (-not (Test-Path $hnsepSource)) {
            throw "hnsep model directory not found in model cache: $hnsepSource"
          }
          if (Test-Path $hnsepDest) {
            Remove-Item -Recurse -Force $hnsepDest
          }
          Copy-Item -Path $hnsepSource -Destination $hnsepDest -Recurse -Force
          foreach ($requiredHNSep in @("hnsep_VR.onnx", "hnsep_VR_convstft.onnx", "split/hnsep_pre.onnx", "split/hnsep_core.onnx", "split/hnsep_post.onnx")) {
            $requiredPath = Join-Path $hnsepDest $requiredHNSep
            if (-not (Test-Path $requiredPath)) {
              throw "Required HNSep model missing after copy: $requiredPath"
            }
          }
          Write-Host "Prepared HNSep model directory <= $hnsepSource"

          Write-Host "Prepared build models in $dstModels"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DUSE_ASIO=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel -- /p:WholeProgramOptimization=false

      - name: Prepare Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package

          # Copy standalone app
          Copy-Item -Path "build/SVCFusionStudio_artefacts/${{ env.BUILD_TYPE }}/*" -Destination "package/" -Recurse -Force

          # Move VST3 binary next to the exe (avoid the VST3 folder packaging)
          $vst3Binary = "build/SVCFusionStudioPlugin_artefacts/${{ env.BUILD_TYPE }}/VST3/SVCFusionStudio.vst3/Contents/x86_64-win/SVCFusionStudio.vst3"
          if (Test-Path $vst3Binary) {
            Copy-Item -Path $vst3Binary -Destination "package/SVCFusionStudio.vst3" -Force
          } else {
            Write-Warning "VST3 binary not found at $vst3Binary"
          }

          if (Test-Path "package/VST3") {
            Remove-Item -Recurse -Force "package/VST3"
          }

          # Create no-models package (keep models dirs, remove files)
          New-Item -ItemType Directory -Force -Path package-nomodels
          Copy-Item -Path "package/*" -Destination "package-nomodels" -Recurse -Force
          Get-ChildItem -Path "package-nomodels" -Recurse -Directory -Filter models | ForEach-Object {
            Get-ChildItem -Path $_.FullName -Force | Remove-Item -Recurse -Force
            New-Item -ItemType Directory -Force -Path $_.FullName | Out-Null
          }
          if (-not (Test-Path "package-nomodels/models")) {
            New-Item -ItemType Directory -Force -Path "package-nomodels/models" | Out-Null
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Windows-CPU
          path: package/
          retention-days: 30

      - name: Upload Artifact (No Models)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Windows-CPU-NoModels
          path: package-nomodels/
          retention-days: 30

  # ===========================================
  # Windows DirectML Build
  # ===========================================
  build-windows-directml:
    needs: prepare-model-cache
    runs-on: windows-latest
    name: Windows (DirectML)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Ensure JUCE Build Helpers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $required = "third_party/JUCE/extras/Build/CMake/JUCEModuleSupport.cmake"
          if (Test-Path $required) {
            Write-Host "JUCE build helpers already present"
            exit 0
          }

          $juceCmake = "third_party/JUCE/CMakeLists.txt"
          if (-not (Test-Path $juceCmake)) {
            throw "Missing $juceCmake"
          }

          $match = Select-String -Path $juceCmake -Pattern 'project\(JUCE VERSION ([0-9\.]+)' | Select-Object -First 1
          if (-not $match) {
            throw "Unable to parse JUCE version from $juceCmake"
          }

          $juceVersion = $match.Matches[0].Groups[1].Value
          $tmpDir = Join-Path $PWD ".ci-juce"
          $archivePath = Join-Path $tmpDir "JUCE.tar.gz"
          $downloadUrl = "https://github.com/juce-framework/JUCE/archive/refs/tags/$juceVersion.tar.gz"

          if (Test-Path $tmpDir) {
            Remove-Item -Recurse -Force $tmpDir
          }
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath
          tar -xzf $archivePath -C $tmpDir

          $extractRoot = Get-ChildItem -Path $tmpDir -Directory | Where-Object { $_.Name -like "JUCE-*" } | Select-Object -First 1
          if (-not $extractRoot) {
            throw "Failed to extract JUCE archive"
          }

          $srcBuildDir = Join-Path $extractRoot.FullName "extras/Build"
          if (-not (Test-Path $srcBuildDir)) {
            throw "Downloaded JUCE archive does not contain extras/Build"
          }

          New-Item -ItemType Directory -Force -Path "third_party/JUCE/extras" | Out-Null
          Copy-Item -Path $srcBuildDir -Destination "third_party/JUCE/extras/" -Recurse -Force

          if (-not (Test-Path $required)) {
            throw "Failed to restore $required"
          }

      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: build/_deps/onnxruntime-src
          key: windows-onnxruntime-${{ env.ONNXRUNTIME_VERSION }}-directml-${{ env.DIRECTML_VERSION }}

      - name: Restore Model Cache
        uses: actions/download-artifact@v4
        with:
          name: ci-model-cache
          path: .ci-model-cache/extracted

      - name: Download DirectML Runtime
        shell: pwsh
        run: |
          # Download DirectML NuGet package
          $dmlUrl = "https://www.nuget.org/api/v2/package/Microsoft.AI.DirectML/${{ env.DIRECTML_VERSION }}"
          Invoke-WebRequest -Uri $dmlUrl -OutFile "directml.nupkg"

          # Extract (nupkg is just a zip)
          Expand-Archive -Path "directml.nupkg" -DestinationPath "directml_pkg" -Force

          # Create vendor directory and copy DLL
          New-Item -ItemType Directory -Force -Path "vendor/directml/bin"
          Copy-Item -Path "directml_pkg/bin/x64-win/DirectML.dll" -Destination "vendor/directml/bin/"

          Write-Host "DirectML ${{ env.DIRECTML_VERSION }} downloaded successfully"
          Get-ChildItem "vendor/directml/bin/"

      - name: Prepare Build Models (DirectML fp32 slim)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $extractDir = ".ci-model-cache/extracted"
          if (-not (Test-Path $extractDir)) {
            throw "Model cache directory not found: $extractDir"
          }

          $dstModels = "Resources/models"
          New-Item -ItemType Directory -Force -Path $dstModels | Out-Null

          $onnxFiles = Get-ChildItem -Path $extractDir -Recurse -File -Filter *.onnx
          if (-not $onnxFiles) {
            throw "No ONNX files found in model cache"
          }

          $onnxMap = @{}
          foreach ($file in $onnxFiles) {
            $onnxMap[$file.Name.ToLowerInvariant()] = $file.FullName
          }

          function Resolve-OnnxCandidate {
            param(
              [string] $BaseFile,
              [string[]] $Candidates
            )

            foreach ($candidate in $Candidates) {
              $key = $candidate.ToLowerInvariant()
              if ($onnxMap.ContainsKey($key)) {
                return $onnxMap[$key]
              }
            }

            throw "Unable to resolve required ONNX model '$BaseFile'. Tried: $($Candidates -join ', ')"
          }

          $targetOnnx = @(
            "contentvec768l12.onnx",
            "pc_nsf_hifigan.onnx",
            "fcpe.onnx",
            "rmvpe.onnx",
            "some.onnx"
          )

          foreach ($baseFile in $targetOnnx) {
            $stem = [System.IO.Path]::GetFileNameWithoutExtension($baseFile)
            $sourcePath = Resolve-OnnxCandidate -BaseFile $baseFile -Candidates @(
              "${stem}_fp32_slim.onnx",
              "${stem}_fp32.onnx",
              $baseFile
            )

            Copy-Item -Path $sourcePath -Destination (Join-Path $dstModels $baseFile) -Force
            Write-Host "Selected $baseFile <= $(Split-Path $sourcePath -Leaf)"
          }

          foreach ($binName in @("cent_table.bin", "mel_filterbank.bin")) {
            $binFile = Get-ChildItem -Path $extractDir -Recurse -File -Filter $binName | Select-Object -First 1
            if ($binFile) {
              Copy-Item -Path $binFile.FullName -Destination (Join-Path $dstModels $binName) -Force
              Write-Host "Prepared $binName <= $(Split-Path $binFile.FullName -Leaf)"
            } else {
              throw "$binName not found in model cache"
            }
          }

          $hnsepSource = Join-Path $extractDir "hnsep"
          $hnsepDest = Join-Path $dstModels "hnsep"
          if (-not (Test-Path $hnsepSource)) {
            throw "hnsep model directory not found in model cache: $hnsepSource"
          }
          if (Test-Path $hnsepDest) {
            Remove-Item -Recurse -Force $hnsepDest
          }
          Copy-Item -Path $hnsepSource -Destination $hnsepDest -Recurse -Force
          foreach ($requiredHNSep in @("hnsep_VR.onnx", "hnsep_VR_convstft.onnx", "split/hnsep_pre.onnx", "split/hnsep_core.onnx", "split/hnsep_post.onnx")) {
            $requiredPath = Join-Path $hnsepDest $requiredHNSep
            if (-not (Test-Path $requiredPath)) {
              throw "Required HNSep model missing after copy: $requiredPath"
            }
          }
          Write-Host "Prepared HNSep model directory <= $hnsepSource"

          Write-Host "Prepared build models in $dstModels"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DUSE_DIRECTML=ON -DUSE_BUNDLED_DIRECTML_RUNTIME=ON -DUSE_ASIO=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel -- /p:WholeProgramOptimization=false

      - name: Prepare Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package

          # Copy standalone app
          Copy-Item -Path "build/SVCFusionStudio_artefacts/${{ env.BUILD_TYPE }}/*" -Destination "package/" -Recurse -Force

          # Move VST3 binary next to the exe (avoid the VST3 folder packaging)
          $vst3Binary = "build/SVCFusionStudioPlugin_artefacts/${{ env.BUILD_TYPE }}/VST3/SVCFusionStudio.vst3/Contents/x86_64-win/SVCFusionStudio.vst3"
          if (Test-Path $vst3Binary) {
            Copy-Item -Path $vst3Binary -Destination "package/SVCFusionStudio.vst3" -Force
          } else {
            Write-Warning "VST3 binary not found at $vst3Binary"
          }

          if (Test-Path "package/VST3") {
            Remove-Item -Recurse -Force "package/VST3"
          }

          # Create no-models package (keep models dirs, remove files)
          New-Item -ItemType Directory -Force -Path package-nomodels
          Copy-Item -Path "package/*" -Destination "package-nomodels" -Recurse -Force
          Get-ChildItem -Path "package-nomodels" -Recurse -Directory -Filter models | ForEach-Object {
            Get-ChildItem -Path $_.FullName -Force | Remove-Item -Recurse -Force
            New-Item -ItemType Directory -Force -Path $_.FullName | Out-Null
          }
          if (-not (Test-Path "package-nomodels/models")) {
            New-Item -ItemType Directory -Force -Path "package-nomodels/models" | Out-Null
          }

          # Verify DirectML.dll is included
          if (Test-Path "package/DirectML.dll") {
            Write-Host "DirectML.dll included in package"
          } else {
            Write-Warning "DirectML.dll NOT found in package!"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Windows-DirectML
          path: package/
          retention-days: 30

      - name: Upload Artifact (No Models)
        uses: actions/upload-artifact@v4
        with:
          name: SVCFusionStudio-Windows-DirectML-NoModels
          path: package-nomodels/
          retention-days: 30

  # ===========================================
  # Windows CUDA Build
  # ===========================================
  build-windows-cuda:
    needs: prepare-model-cache
    runs-on: windows-latest
    name: Windows (CUDA)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Ensure JUCE Build Helpers
